<!DOCTYPE html>
<html>
  <head>
    <style>
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(208px, 1fr));
        gap: 1rem;
        padding: 1rem;
      }

      .gallery-item {
        position: relative;
        overflow: hidden;
        height: 250px; /* controls the box height */
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* fills the box without stretching */
      }

      .caption {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 0.5rem;
        transform: translateY(100%);
        transition: 0.3s;
        font-size: 0.8rem;
      }

      .gallery-item:hover .caption {
        transform: translateY(0);
      }
      h1{
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1> My work so far </h1>
    <div class="gallery">
      <div class="gallery-item">
        <img src="monkeyshock.jpeg" alt="testing">
        <div class="caption">Week 1</div>
      </div>
      <div class="gallery-item">
        <img src="monkeyshock.jpeg" alt="testing">
        <div class="caption">Week 2</div>
      </div>
      <div class="gallery-item">
        <img src="monkeyshock.jpeg" alt="testing">
        <div class="caption">Week 3</div>
      </div>
      <div class="gallery-item">
        <img src="monkeyshock.jpeg" alt="testing">
        <div class="caption">Week 4</div>
      </div>
      <div class="gallery-item">
        <img src="monkeyshock.jpeg" alt="testing">
        <div class="caption">Extra research</div>
      </div>
      <div class="gallery-item">
        <img src="monkeyshock.jpeg" alt="testing">
        <div class="caption">Extra research</div>
      </div>
    </div>
    <div class="tutor-gallery">
        credit to my tutor for the gallery :3
    </div>
    
  </body>
</html>
